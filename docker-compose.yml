version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ogis_ready_db
    restart: always
    environment:
      POSTGRES_DB: ready_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ready
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ogis_ready_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
